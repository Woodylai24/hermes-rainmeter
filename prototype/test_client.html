<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes WebSocket Test Client</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Consolas', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* --- Header / Connection Bar --- */
  #header {
    background: #16213e;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid #0f3460;
  }

  #url-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
  }
  #url-input:focus { border-color: #4ecca3; }

  button {
    padding: 8px 18px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s;
  }

  #connect-btn {
    background: #4ecca3;
    color: #1a1a2e;
  }
  #connect-btn:hover { background: #3baa8a; }
  #connect-btn.connected {
    background: #e74c3c;
    color: #fff;
  }
  #connect-btn.connected:hover { background: #c0392b; }

  /* --- Status Indicator --- */
  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .status-dot.disconnected { background: #e74c3c; }
  .status-dot.connecting   { background: #f39c12; }
  .status-dot.connected    { background: #2ecc71; }

  #status-label {
    font-size: 13px;
    color: #aaa;
    min-width: 100px;
  }

  /* --- Message Log --- */
  #log-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .msg.received {
    align-self: flex-start;
    background: #16213e;
    border: 1px solid #0f3460;
  }
  .msg.sent {
    align-self: flex-end;
    background: #1b3a4b;
    border: 1px solid #4ecca3;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    border: 1px dashed #555;
    color: #888;
    font-size: 12px;
    text-align: center;
  }

  .msg .ts {
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
  }
  .msg.sent .ts { text-align: right; }

  .msg .dir {
    font-weight: 700;
    margin-right: 4px;
  }
  .msg.received .dir { color: #4ecca3; }
  .msg.sent .dir     { color: #e0a458; }

  /* --- Input Bar --- */
  #input-bar {
    background: #16213e;
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    border-top: 2px solid #0f3460;
  }

  #msg-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  #msg-input:focus { border-color: #4ecca3; }

  #send-btn {
    background: #4ecca3;
    color: #1a1a2e;
  }
  #send-btn:hover { background: #3baa8a; }
  #send-btn:disabled {
    background: #555;
    color: #999;
    cursor: not-allowed;
  }

  /* --- Scrollbar --- */
  #log-area::-webkit-scrollbar { width: 8px; }
  #log-area::-webkit-scrollbar-track { background: #1a1a2e; }
  #log-area::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }
</style>
</head>
<body>

<div id="header">
  <span id="status-dot" class="status-dot disconnected"></span>
  <span id="status-label">Disconnected</span>
  <input id="url-input" type="text" value="ws://localhost:8643/ws" spellcheck="false" />
  <button id="connect-btn">Connect</button>
</div>

<div id="log-area"></div>

<div id="input-bar">
  <input id="msg-input" type="text" placeholder="Type a message (JSON or plain text)…" disabled />
  <button id="send-btn" disabled>Send</button>
</div>

<script>
(function () {
  const urlInput    = document.getElementById('url-input');
  const connectBtn  = document.getElementById('connect-btn');
  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const logArea     = document.getElementById('log-area');
  const msgInput    = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');

  let ws = null;
  let reconnectTimer = null;
  let intentionalDisconnect = false;

  // --- Helpers ---

  function ts() {
    const d = new Date();
    return d.toTimeString().slice(0, 8);
  }

  function tryFormatJson(str) {
    try {
      const obj = JSON.parse(str);
      return JSON.stringify(obj, null, 2);
    } catch {
      return str;
    }
  }

  function addMessage(direction, text, cls) {
    const div = document.createElement('div');
    div.className = 'msg ' + (cls || (direction === 'in' ? 'received' : 'sent'));

    const tsSpan = document.createElement('div');
    tsSpan.className = 'ts';
    tsSpan.textContent = '[' + ts() + ']';

    const body = document.createElement('div');
    if (direction === 'in' || direction === 'out') {
      const dir = document.createElement('span');
      dir.className = 'dir';
      dir.textContent = direction === 'in' ? '<<' : '>>';
      body.appendChild(dir);
    }

    const content = document.createElement('span');
    content.textContent = tryFormatJson(text);
    body.appendChild(content);

    div.appendChild(tsSpan);
    div.appendChild(body);
    logArea.appendChild(div);
    logArea.scrollTop = logArea.scrollHeight;
  }

  function addSystem(text) {
    addMessage('sys', text, 'system');
  }

  function setStatus(state) {
    statusDot.className = 'status-dot ' + state;
    statusLabel.textContent =
      state === 'connected'    ? 'Connected' :
      state === 'connecting'   ? 'Connecting…' :
                                 'Disconnected';
  }

  function setConnected(connected) {
    msgInput.disabled = !connected;
    sendBtn.disabled  = !connected;
    if (connected) {
      connectBtn.textContent = 'Disconnect';
      connectBtn.classList.add('connected');
    } else {
      connectBtn.textContent = 'Connect';
      connectBtn.classList.remove('connected');
    }
  }

  // --- Connection ---

  function connect() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
      return;
    }
    intentionalDisconnect = false;
    const url = urlInput.value.trim();
    if (!url) return;

    setStatus('connecting');
    addSystem('Connecting to ' + url + '…');

    try {
      ws = new WebSocket(url);
    } catch (e) {
      addSystem('Failed to create WebSocket: ' + e.message);
      setStatus('disconnected');
      scheduleReconnect();
      return;
    }

    ws.onopen = function () {
      setStatus('connected');
      setConnected(true);
      addSystem('Connected!');
    };

    ws.onmessage = function (evt) {
      addMessage('in', evt.data);
    };

    ws.onclose = function () {
      setStatus('disconnected');
      setConnected(false);
      addSystem('Disconnected');
      if (!intentionalDisconnect) {
        scheduleReconnect();
      }
    };

    ws.onerror = function () {
      addSystem('Connection error');
    };
  }

  function disconnect() {
    intentionalDisconnect = true;
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
    if (ws) {
      ws.close();
      ws = null;
    }
    setStatus('disconnected');
    setConnected(false);
  }

  function scheduleReconnect() {
    if (intentionalDisconnect) return;
    if (reconnectTimer) return;
    addSystem('Reconnecting in 3 seconds…');
    reconnectTimer = setTimeout(function () {
      reconnectTimer = null;
      connect();
    }, 3000);
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(text);
    addMessage('out', text);
    msgInput.value = '';
    msgInput.focus();
  }

  // --- Event Listeners ---

  connectBtn.addEventListener('click', function () {
    if (ws && ws.readyState === WebSocket.OPEN) {
      disconnect();
    } else {
      connect();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  msgInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendMessage();
    }
  });

  // Initial state
  setStatus('disconnected');
  setConnected(false);
})();
</script>
</body>
</html>
