; ============================================
; Hermes Rainmeter Plugin — Test Skin
; ============================================
; Place HermesRainmeter.dll in %APPDATA%\Rainmeter\Plugins\
; Adjust Server URL to match your Hermes gateway
;
; Bangs:
;   [!CommandMeasure HermesMeasure "SendMessage Hello Hermes"]
;   [!CommandMeasure HermesMeasure "SendCommand /status"]
;   [!CommandMeasure HermesMeasure "Connect"]
;   [!CommandMeasure HermesMeasure "Disconnect"]
;   [!CommandMeasure HermesMeasure "Ping"]
; ============================================

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
HermesServer=ws://localhost:8643/ws
HermesAuthToken=

; --- Plugin Measure ---

[HermesMeasure]
Measure=Plugin
Plugin=HermesRainmeter
Server=#HermesServer#
AuthToken=#HermesAuthToken#
AutoReconnect=1
ReconnectInterval=5
OnMessage=[!SetVariable HermesLastMsg "$message$"][!UpdateMeter MessageText][!UpdateMeter MessageCount]
OnConnected=[!SetOption StatusIndicator SolidColor 0,200,0,255][!SetVariable HermesStatus "Connected"][!UpdateMeter StatusLabel]
OnDisconnected=[!SetOption StatusIndicator SolidColor 200,0,0,255][!SetVariable HermesStatus "Disconnected"][!UpdateMeter StatusLabel]
OnError=[!SetVariable HermesError "$message$"][!UpdateMeter ErrorLabel]

[HermesMsgCount]
Measure=Calc
Formula=HermesMsgCount + 1
DynamicVariables=1
Disabled=1

; --- UI Elements ---

[Background]
Meter=Image
W=400
H=320
SolidColor=30,30,30,240
SolidColor2=20,20,20,240
GradientAngle=90

[Title]
Meter=String
X=15
Y=10
FontFace=Segoe UI
FontSize=14
FontWeight=700
FontColor=220,220,220
AntiAlias=1
Text=Hermes Rainmeter

[StatusLabel]
