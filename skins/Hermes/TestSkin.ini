X=370
Y=12
W=100
H=20
FontFace=Segoe UI
FontSize=10
FontColor=180,180,180
AntiAlias=1
Text=#HermesStatus#
DynamicVariables=1

[StatusIndicator]
Meter=Image
X=356
Y=15
W=10
H=10
SolidColor=200,200,0,255
DynamicVariables=1

[Separator]
Meter=Image
X=10
Y=38
W=380
H=1
SolidColor=60,60,60,200

